services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chapel
      POSTGRES_PASSWORD: chapel
      POSTGRES_DB: chapel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chapel -d chapel']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - '2500:2500'
    environment:
      PORT: 2500
      NUXT_SESSION_COOKIE_SECURE: 'false'
      DATABASE_URL: postgresql://chapel:chapel@db:5432/chapel
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:-please-change-this-session-secret-min-32-chars}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@chapel.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      NUXT_PUBLIC_APP_NAME: CHAPEL
      AUDIO_STORAGE_PATH: /data/audio
    volumes:
      - audio_data:/data/audio
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  audio_data:
